name: Deploy static site to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: List files (diagnostic)
        run: |
          echo "Files that will be uploaded as the Pages artifact:"
          ls -la

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Change this if your HTML/CSS/JS files live in a subfolder
          # e.g. path: './public' or './docs'
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
